<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Detektor Buah Cepat</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; min-height: 100vh; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 420px; text-align: center; }
        
        h2 { color: #1a73e8; margin-bottom: 20px; }
        .btn-utama { width: 100%; padding: 18px; background: #1a73e8; color: white; border: none; border-radius: 12px; font-size: 1.2em; font-weight: bold; cursor: pointer; }
        
        #camera-container { display: none; }
        #webcam-container { width: 300px; height: 300px; background: #2c3e50; margin: 10px auto; border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 3px solid #ddd; }
        
        .btn-capture-save { width: 100%; padding: 20px; background: #28a745; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1.2em; margin-top: 10px; }
        .btn-capture-save:active { background: #218838; transform: scale(0.95); }

        .label-box { padding: 15px; border-radius: 8px; margin-top: 10px; font-size: 1.2em; font-weight: bold; }
        .label-default { background: #e8f0fe; color: #1967d2; }
        .label-mentah { background: #fde8e8; color: #d32f2f; border: 2px solid #d32f2f; }
        .label-matang { background: #e8f5e9; color: #2e7d32; border: 2px solid #2e7d32; }

        canvas#preview-canvas { display: none; } /* Sembunyikan canvas proses agar tidak berat */
    </style>
</head>
<body>

<div class="card">
    <div id="form-container">
        <h2>🌴 Sortasi Sawit AI</h2>
        <button class="btn-utama" id="btn-start" onclick="mulaiKamera()">📸 MASUK KE KAMERA</button>
    </div>

    <div id="camera-container">
        <div id="webcam-container"></div>
        <div id="label-container" class="label-box label-default">Memuat AI...</div>
        
        <button class="btn-capture-save" id="btn-action" onclick="ambilDanSimpan()" disabled>📸 AMBIL & SIMPAN</button>
        
        <canvas id="preview-canvas" width="300" height="300"></canvas>
        <p style="margin-top: 15px; font-size: 0.8em; color: #666;">Klik tombol hijau untuk simpan otomatis</p>
    </div>
</div>

<script>
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/ZkvJoTy22/";
    let model, webcam, maxPredictions;
    let currentLabel = "", currentProb = 0;

    async function mulaiKamera() {
        document.getElementById("btn-start").innerHTML = "⏳ Memuat...";
        document.getElementById("form-container").style.display = "none";
        document.getElementById("camera-container").style.display = "block";

        model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
        maxPredictions = model.getTotalClasses();

        webcam = new tmImage.Webcam(300, 300, false);
        await webcam.setup({ facingMode: "environment" });
        await webcam.play();

        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("webcam-container").appendChild(webcam.canvas);
        document.getElementById("btn-action").disabled = false;
        
        window.requestAnimationFrame(loop);
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        let bestLabel = "";
        let highestProb = 0;
        for (let i = 0; i < maxPredictions; i++) {
            if (prediction[i].probability > highestProb) {
                highestProb = prediction[i].probability;
                bestLabel = prediction[i].className;
            }
        }
        currentLabel = bestLabel;
        currentProb = highestProb;
        const lb = document.getElementById("label-container");
        lb.innerHTML = `${bestLabel} (${(highestProb * 100).toFixed(0)}%)`;
        lb.className = "label-box " + (bestLabel.toLowerCase().includes("mentah") ? "label-mentah" : (bestLabel.toLowerCase().includes("matang") ? "label-matang" : "label-default"));
    }

    function ambilDanSimpan() {
        const canvas = document.getElementById("preview-canvas");
        const ctx = canvas.getContext("2d", { alpha: false });

        // 1. Gambar dari webcam ke canvas internal
        ctx.drawImage(webcam.canvas, 0, 0, 300, 300);
        
        // 2. Tambah Watermark (Sangat Cepat)
        ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
        ctx.fillRect(0, 250, 300, 50); 
        ctx.fillStyle = "white";
        ctx.font = "bold 15px Arial";
        ctx.fillText(`${currentLabel.toUpperCase()} (${(currentProb * 100).toFixed(0)}%)`, 10, 272);
        ctx.font = "11px Arial";
        ctx.fillText(new Date().toLocaleString('id-ID'), 10, 288);
        
        // 3. Konversi ke JPEG (Lebih ringan & cepat dibanding PNG)
        const dataURL = canvas.toDataURL("image/jpeg", 0.8);
        
        // 4. Trigger Download Langsung
        const link = document.createElement('a');
        link.download = `SAWIT_${Date.now()}.jpg`;
        link.href = dataURL;
        link.click();
    }
</script>
</body>
</html>
